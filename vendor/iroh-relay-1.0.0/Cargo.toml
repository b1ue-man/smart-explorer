[package]
edition = "2024"
rust-version = "1.91"
name = "iroh-relay"
version = "1.0.0"
authors = ["n0 team"]
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Iroh's relay server and client"
readme = "README.md"
keywords = [
    "networking",
    "holepunching",
    "p2p",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/n0-computer/iroh"
resolver = "2"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [
    "--cfg",
    "iroh_docsrs",
]

[package.metadata.cargo_check_external_types]
allowed_external_types = [
    "iroh_base::*",
    "iroh_dns::*",
    "iroh_metrics::*",
    "n0_error::*",
    "noq::*",
    "noq_proto::*",
    "bytes::*",
    "http::*",
    "http_body::*",
    "hyper::*",
    "rustls_pki_types::*",
    "serde_core::*",
    "tokio::*",
    "url::*",
    "rustls::*",
    "tokio_rustls::*",
    "futures_core::stream::Stream",
    "futures_sink::Sink",
]

[features]
default = [
    "metrics",
    "tls-ring",
]
metrics = ["iroh-metrics/metrics"]
platform-verifier = ["dep:rustls-platform-verifier"]
server = [
    "metrics",
    "tokio/signal",
    "dep:clap",
    "dep:dashmap",
    "dep:rcgen",
    "dep:reloadable-state",
    "dep:rustls-cert-file-reader",
    "dep:rustls-cert-reloadable-resolver",
    "dep:time",
    "dep:tokio-rustls-acme",
    "dep:tokio-websockets",
    "dep:simdutf8",
    "dep:sha1",
    "dep:toml",
    "dep:serde_json",
    "dep:tracing-subscriber",
    "noq/platform-verifier",
    "noq/runtime-tokio",
    "iroh-metrics/service",
    "tls-ring",
]
test-utils = []
tls-aws-lc-rs = [
    "noq/aws-lc-rs",
    "rustls/aws-lc-rs",
    "tokio-rustls/aws-lc-rs",
    "tokio-websockets/aws_lc_rs",
    "hickory-resolver/https-aws-lc-rs",
    "iroh-dns/tls-aws-lc-rs",
]
tls-ring = [
    "noq/ring",
    "rustls/ring",
    "tokio-rustls/ring",
    "tokio-websockets/ring",
    "hickory-resolver/https-ring",
    "iroh-dns/tls-ring",
]

[lib]
name = "iroh_relay"
crate-type = [
    "lib",
]
path = "src/lib.rs"

[[bin]]
name = "iroh-relay"
path = "src/main.rs"
required-features = ["server"]

[[test]]
name = "relay_axum"
path = "tests/relay_axum.rs"

[[test]]
name = "relay_hyper"
path = "tests/relay_hyper.rs"

[[test]]
name = "runtime_auth"
path = "tests/runtime_auth.rs"

