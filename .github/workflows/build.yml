name: build

# Builds the Windows release on every push using the SAME cross-compile path
# that is verified locally (ubuntu + mingw-w64 + x86_64-pc-windows-gnu). This is
# the "build a release for each commit" gate. It publishes a GitHub Release
# (carrying the exe + the context-menu DLL) on a version tag (v*) OR on a manual
# `workflow_dispatch` — the latter creates the tag at the dispatched commit, so
# releases can be cut even where the git host doesn't accept tag pushes.

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-gnu:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: native
    steps:
      - uses: actions/checkout@v4

      - name: Install mingw-w64 linker
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      - name: Check (windows target)
        run: cargo check --target x86_64-pc-windows-gnu

      - name: Unit tests (host)
        # The crate is host-buildable (rfd xdg-portal on non-Windows), so the
        # full unit-test suite runs here — no display needed.
        run: cargo test --bin smart_explorer

      - name: Compile test harness (windows target)
        run: cargo test --no-run --bin smart_explorer --target x86_64-pc-windows-gnu

      - name: Release build
        run: cargo build --release --target x86_64-pc-windows-gnu --bin smart_explorer

      - name: Build context-menu COM DLL
        working-directory: native/explorer-command
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Stage update feed
        id: stage
        run: |
          mkdir -p out
          cp "target/x86_64-pc-windows-gnu/release/smart_explorer.exe" "out/smart_explorer.exe"
          cp "explorer-command/target/x86_64-pc-windows-gnu/release/smart_explorer_command.dll" "out/smart_explorer_command.dll"
          ver=$(sed -nE 's/^version = "([^"]+)".*/\1/p' Cargo.toml | head -1)
          printf '%s\n' "$ver" > out/version.txt
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Built version $ver"

      - uses: actions/upload-artifact@v4
        with:
          name: smart-explorer-windows
          path: native/out

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          # On a manual dispatch (no tag ref), create the tag at this commit.
          tag_name: v${{ steps.stage.outputs.version }}
          name: Smart Explorer ${{ steps.stage.outputs.version }}
          body: |
            Self-contained Windows x64 build (no installer needed).

            - `smart_explorer.exe` — the app (also the self-update payload; the
              app pulls it from `release-native/update-feed/` over the git feed).
            - `smart_explorer_command.dll` — the Win11 modern context-menu
              IExplorerCommand handler (needs signing to register; see
              `docs/WIN11_CONTEXT_MENU.md`).

            Built by CI via the verified ubuntu + mingw-w64 +
            `x86_64-pc-windows-gnu` cross-compile.
          files: |
            native/out/smart_explorer.exe
            native/out/smart_explorer_command.dll
            native/out/version.txt
